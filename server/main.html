<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p id="display">Hello</p>
    <button type="button" onclick="connect_server()">Connect</button>
    <script>
        // Ajax: a technology allow users or fontEnd to send or get data 
        // from server or BackEnd
        function connect_server() {
            // step 1: create ajax request obj
            let request;
            request = new XMLHttpRequest();
            // step 2: open request to sever
            // HTTP GET: request data from server
            // HTTP POST: insert data to server
            request.open("GET", "data.txt");
            request.onreadystatechange = function() {
                if (request.readyState == 4 && request.status == 200) {
                    document.getElementById("display").innerHTML =
                        request.responseText;
                }
            }
            request.send();
        }
    </script>
</body>

</html>
