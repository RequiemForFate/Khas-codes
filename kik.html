<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const student_obj = {
            student_id: prompt("Enter student ID"),
            name: prompt("Enter student name"),
            age: parseFloat(prompt("Enter age")),
            major: prompt("Enter Major"),
            score: [
                parseFloat(prompt("Enter JS score:")),
                parseFloat(prompt("Enter C++ score")),
                parseFloat(prompt("Enter HTML score"))
            ],
            averge: function() {
                let total = (this.score[0] + this.score[1] + this.score[2]) / 3;
                return total;
            }
        }

        function saveData() {
            const userProfile = {
                name: document.getElementById(prompt("Enter student name")).value,
                age: document.getElementById(parseFloat(prompt("Enter age"))).value,
                major: document.getElementById(prompt("Enter Major")),
                score: document.getElementsByClassName[
                    parseFloat(prompt("Enter JS core:")),
                    parseFloat(prompt("Enter C++ score")),
                    parseFloat(prompt("Enter HTML score"))
                ]
            };

            console.log(userProfile);
        }
    </script>

    <input type="text" id="userName" placeholder="Enter Name">
    <input type="text" id="userAge" placeholder="Enter Age">
    <button onclick="saveData()">Save</button>
    <button onclick="document.getElementById('userProfile').innerText = '';">Clear</button>
    <pre id="userProfile"></pre>

</body>

</html>
