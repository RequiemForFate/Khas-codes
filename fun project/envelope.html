<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envelope</title>
    <link rel="stylesheet" type="text/css" href="envelope.css">
    <script src="envelope.js" defer></script>
</head>

<body>

    <div class="envelope" id="envelope">
        <div class="cover top close" id="envelopeTop"></div>
        <div class="cover bottom right" id="bottom-right"></div>
        <div class="cover left" id="left"></div>
        <div class="letter in" id="contact">
            <div class="letter-text">
                <h4>Dear Friend,</h4>
                <p>This letter is hidden inside the envelope until you open it.</p>
                <p>Hover over the envelope to reveal the message.</p>
                <p>Sincerely,<br>Envelope</p>
            </div>
        </div>
    </div>



</body>

</html>
