<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Study Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<style>
    /* Layout and speech bubble styling for timer character */
    
    .timer-card {
        width: 67%;
        border-radius: 20px !important;
    }
    
    .character-box {
        position: relative;
        width: 100%;
        min-height: 310px;
        overflow: visible;
        padding: 1.5rem;
        background: rgba(13, 110, 253, 0.05);
        border: 1px solid rgba(13, 110, 253, 0.15);
        border-radius: 1rem;
    }
    
    .character-box img {
        position: relative;
        z-index: 0;
        max-width: 100%;
        height: auto;
        display: block;
        transform: scale(1.05);
    }
    
    #musicCollapse .character-box img,
    .music-controls-box img,
    .music-box img {
        max-width: 80%;
        height: auto;
        display: block;
        margin: 0 auto;
        transform: scale(0.95);
    }
    
    .pointer-cursor {
        cursor: pointer;
        transition: transform 0.1s ease;
    }
    /* Quick scale down on active tap to give tactile feedback */
    
    .pointer-cursor:active {
        transform: scale(0.9);
    }
    /* Custom Speech Bubble styling positioned over the sprite */
    
    #speech-bubble {
        position: absolute;
        top: -40px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(255, 255, 255, 0.96);
        color: #0d1f3f;
        padding: 10px 16px;
        border: 2px solid rgba(13, 110, 253, 0.8);
        border-radius: 18px;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
        box-shadow: 0 10px 24px rgba(13, 110, 253, 0.18);
        z-index: 10;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }
    
    #speech-bubble::after {
        content: '';
        position: absolute;
        bottom: -7px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 8px 8px 0;
        border-style: solid;
        border-color: rgba(255, 255, 255, 0.96) transparent;
    }
    
    @media (max-width: 767.98px) {
        .col-md-4,
        .col-md-5,
        .col-md-7,
        .col-md-8 {
            flex: 0 0 100%;
            max-width: 100%;
        }
        #speech-bubble {
            position: static;
            width: auto;
            margin-bottom: 1rem;
        }
    }
    
    .music-controls-box {
        background: rgba(13, 110, 253, 0.05);
        padding: 1.5rem;
        border-radius: 1rem;
        border: 1px solid rgba(13, 110, 253, 0.15);
        width: 100%;
        box-shadow: none;
    }
    
    .music-panel-title {
        font-weight: 700;
        font-size: 0.95rem;
        color: #0d6efd;
    }
    
    .music-box {
        position: relative;
        width: 100%;
        min-height: 100px;
        overflow: hidden;
        padding: 1.5rem;
        background: rgba(13, 110, 253, 0.05);
        border: 1px solid rgba(13, 110, 253, 0.15);
        border-radius: 1rem;
    }
    /* Make collapsed music-box image smaller than its outline */
    
    .music-box img,
    #collapse-character-img {
        max-width: 70%;
        height: auto;
        display: block;
        margin: 0 auto;
        transform: scale(0.95);
    }
</style>


<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 m-0">

    <div class="card shadow timer-card p-4" style="max-width: 900px; width: 100%;">
        <!-- Main Body Grid Wrapper -->
        <div class="row g-3 align-items-start">

            <!-- UPPER LEFT: Character -->
            <div class="col-md-5">
                <div class="character-box position-relative mb-4 d-flex align-items-center justify-content-center">
                    <div id="speech-bubble">Let's start.</div>
                    <img id="character-img" src="https://i.postimg.cc/R0q2cPW0/image-2026-06-15-232616654.png" alt="companion" class="img-fluid pointer-cursor">
                </div>
            </div>

            <!-- UPPER RIGHT: Timer Controls & Progress Metrics -->
            <div class="col-md-7">
                <!-- Level UP XP -->
                <div class="stats-display bg-body-tertiary border rounded p-2 mb-3">
                    <span id="level-badge" class="fw-bold d-block mb-1 text-danger">XP: 1</span>
                    <div class="progress mb-1" role="progressbar" aria-label="Progress Level" aria-valuemin="0" aria-valuemax="100" style="height: 10px;">
                        <div id="xp-bar-fill" class="progress-bar bg-gradient bg-danger" style="width: 0%; transition: width 0.4s ease;"></div>
                    </div>
                    <div id="total-points-text" class="small text-muted" style="font-size: 11px;">0 XP / 10 XP</div>
                </div>

                <!-- Achievement Panel -->
                <div id="achievement-box" class="alert alert-warning py-2 mb-3 fw-bold small text-start" role="alert" style="display:none;"></div>
                <h2 id="status-label" class="text-secondary h5 mb-3">It is time to STUDY!!!!</h2>

                <div id="time-display" class="display-3 fw-bold text-dark mb-3" style="font-variant-numeric: tabular-nums;">30:00</div>

                <!-- Timer Action Actions -->
                <form class="form-container mb-3" onsubmit="event.preventDefault();">
                    <div class="btn-group">
                        <button class="btn btn-outline-primary" id="start-btn" onclick="startTimer()">Start Timer</button>
                        <button class="btn btn-outline-secondary" id="pause-btn" onclick="pauseTimer()">Pause Timer</button>
                        <button class="btn btn-outline-danger" id="stop-btn">Stop Timer</button>
                    </div>
                </form>

                <!-- Trigger Toggle Button -->
                <div class="pt-2">
                    <button id="toggle-music-btn" class="btn btn-light btn-sm rounded-pill fw-semibold text-secondary px-3" type="button" data-bs-toggle="collapse" data-bs-target="#musicCollapse" aria-expanded="false" aria-controls="musicCollapse">Show Music Panel</button>
                </div>
            </div>

            <!-- LOWER FULL WIDTH ROW: The Collapsible Panel -->
            <div class="col-12">
                <div class="collapse border-top pt-3 mt-2" id="musicCollapse">
                    <div class="row g-3 align-items-stretch">

                        <!-- Lower Left image -->
                        <div class="col-md-5">
                            <div class="music-box position-relative h-100 d-flex align-items-center justify-content-center border rounded-3 p-3 bg-light">
                                <img id="collapse-character-img" src="https://i.postimg.cc/R0q2cPW0/image-2026-06-15-232616654.png" alt="companion" class="img-fluid pointer-cursor">
                            </div>
                        </div>

                        <!-- lower right -->
                        <div class="col-md-7">
                            <div class="music-controls-box rounded-3 overflow-hidden shadow-sm bg-white p-3 h-100 border">
                                <div class="music-panel-title mb-3 fw-bold">Music Addon</div>

                                <!-- Internal side-by-side splits for embedded media engines -->
                                <div class="row g-3">
                                    <!-- YouTube -->
                                    <div class="col-sm-6">
                                        <div class="embed-wrapper rounded-3 overflow-hidden shadow-sm">
                                            <iframe src="https://youtube.com" title="YouTube" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture;" allowfullscreen class="w-100" style="height: 140px;"></iframe>
                                        </div>
                                    </div>

                                    <!-- Spotify -->
                                    <div class="col-sm-6">
                                        <div class="embed-wrapper rounded-3 overflow-hidden shadow-sm">
                                            <iframe src="https://spotify.com" width="100%" height="140" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
        // giving value to the time
        const study_time = 25 * 60;
        const break_time = 5 * 60;

        // for character sprite gif

        const gif_study = "";
        const gif_break = "";
        const gif_poked = "";

        // dialouge for speech bubble

        const dialouge_tier = {
            level1: ["Let's get to work.", "Focus.", "Hmph."],
            level3: ["Good job.", "See? I knew you can do it.", "I trust that you are following along?"],
            level5: ["You are catching up well.", "Well Done.", "You are improving well."]

        };

        // xp bar

        let affection_xp = parseInt(localStorage.getItem('companionXP')) || 0;
        let affection_level = parseInt(localStorage.getItem('companionLevel')) || 1;
        const XP_per_Level = 10;

        let timeLeft = study_time;
        let timerId = null;
        let isCurrentlyStudy = true;
        let isPoked = false;

        // ui elements

        const timeDisplay = document.getElementById('time-display');
        const statusLabel = document.getElementById('status-label');
        const characterImg = document.getElementById('character-img');
        const bubble = document.getElementById('speech-bubble');
        const achievementBox = document.getElementById('achievement-box')

        function updateTime() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateStatusUI() {
            let levelXP = affection_xp % XP_per_Level;
            let percentage = (levelXP / XP_per_Level) * 100;

            document.getElementById('xp-bar-fill').style.width = `${percentage}%`;
            document.getElementById('level-badge').textContent = `Affection Lvl ${affection_level}`;
            document.getAnimations('total-points-text').textContent = `${levelXP} / ${XP_per_Level} XP (Total: ${affection_xp})`;

            checkMilestoneBadge();
        }

        function startTimer() {
            if (timerId !== null) return;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    switchMode();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        function resetTimer() {
            pauseTimer();
            isCurrentlyStudy = true;
            timeLeft = study_time;
            statusLabel, textContent = gif_study;
            updateDisplay;
        }

        function switchMode() {
            if (isCurrentlyStudy) {
                // earn 2 xp when finished a full session
                affection_xp += 2;
                let newLevel = Math.floor(affection_xp / XP_per_Level) + 1;
                if (newLevel > affection_level) {
                    affection_level = newLevel;
                    triggerAchievementNotification(`Level UP! Level ${affection_level} Unlocked!`);
                }
                localStorage.setItem('companionXP', affection_xp);
                localStorage.setItem('companionLevel', affection_level);
                updateStatusUI();

                isCurrentlyStudy = false;
                timeLeft = break_time;
                statusLabel.textContent = "Hard Work deserve a break.";
                characterImg.src = gif_break;
            } else {
                isCurrentlyStudy = true;
                timeLeft = study_time;
                statusLabel.textContent = "Let continue where we left off.";
                characterImg.src = gif_study;
            }
            updateDisplay();
            startTimer();
        }

        // tap/click action

        function pokeCharacter() {
            if (isPoked) return;
            isPoked = true;

            let dynamicPhrases = dialouge_tier.level1;
            if (affection_level >= 5) {
                dynamicPhrases = dialouge_tier.level5;
            } else if (affection_level >= 3) {
                dynamicPhrases = dialouge_tier.level3;
            }
            const randomIndex = Math.floor(Math.random() * dynamicPhrases.length);
            bubble.textContent = dynamicPhrases[randomIndex];

            bubble.classList.remove('hidden-bubble');
            characterImg.src = gif_poked;

            setTimeout(() => {
                bubble.classList.add('hidden-bubble');
                characterImg.src = isCurrentlyStudy ? gif_study : gif_break;
                isPoked = false;
            }, 2000);
        }

        // achivementn logic

        function triggerAchievementNotification(message) {
            achievementBox.textContent = message;
            achievementBox.style.display = "block";
            setTimeout(() => {
                achievementBox.style.display = "none";
            }, 5000);
        }

        function checkMilestoneBadge() {
            if (affection_level === 3 && !localStorage.getItem('badge_lv3')) {
                localStorage.getItem('badge_lv3', true);
                triggerAchievementNotification("Achievement: Soften Heart");
            }
            if (affection_level === 5 && !localStorage.getItem('badge_lv5')) {
                localStorage.getItem('badge_lv5', true);
                triggerAchievementNotification("Achievement: Trusted Friend");
            }
        }

        // toggle text changes with bootstraps
        function toggleMusicButtonText() {
            const toggleBtn = document.getElementById('toggle-music-btn');
            //time delay for double check
            setTimeout(() => {
                const musicPanel = document.getElementById('musicCollapse');
                if (musicPanel.classList.contains('show')) {
                    toggleBtn.textContent = "Hide Music Panel";
                } else {
                    toggleBtn.textContent = "Show Music Panel";
                }
            }, 50);
        }

        // data ui sync + execution?
        updateDisplay();
        updateStatusUI;
    </script>

</body>

</html>
