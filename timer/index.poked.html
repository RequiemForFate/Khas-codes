<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Study Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 m-0">

    <div class="card shadow timer-card p-4" style="max-width: 900px; width: 100%;">
        <!-- Main Body Grid Wrapper -->
        <div class="row g-3 align-items-start">

            <!-- UPPER LEFT: Character -->
            <div class="col-md-5">
                <div class="character-box position-relative mb-4 d-flex align-items-center justify-content-center">
                    <div id="speech-bubble">Let's start.</div>
                    <img id="character-img" src="https://i.postimg.cc/R0q2cPW0/image-2026-06-15-232616654.png" alt="companion" class="img-fluid pointer-cursor">
                </div>
            </div>

            <!-- UPPER RIGHT: Timer Controls & Progress Metrics -->
            <div class="col-md-7">
                <!-- Level UP XP -->
                <div class="stats-display bg-body-tertiary border rounded p-2 mb-3">
                    <span id="level-badge" class="fw-bold d-block mb-1 text-danger">XP: 1</span>
                    <div class="progress mb-1" role="progressbar" aria-label="Progress Level" aria-valuemin="0" aria-valuemax="100" style="height: 10px;">
                        <div id="xp-bar-fill" class="progress-bar bg-gradient bg-danger" style="width: 0%; transition: width 0.4s ease;"></div>
                    </div>
                    <div id="total-points-text" class="small text-muted" style="font-size: 11px;">0 XP / 10 XP</div>
                </div>

                <!-- Achievement Panel -->
                <div id="achievement-box" class="alert alert-warning py-2 mb-3 fw-bold small text-start" role="alert" style="display: none;"></div>
                <h2 id="status-label" class="text-secondary h5 mb-3">It is time to STUDY!!!!</h2>

                <div id="time-display" class="display-3 fw-bold text-dark mb-3" style="font-variant-numeric: tabular-nums;">30:00</div>

                <!-- Timer Action Actions -->
                <form class="form-container mb-3" onsubmit="event.preventDefault();">
                    <div class="btn-group">
                        <button class="btn btn-outline-primary" id="start-btn" onclick="startTimer()" type="button">Start Timer</button>
                        <button class="btn btn-outline-secondary" id="pause-btn" onclick="pauseTimer()" type="button">Pause Timer</button>
                        <button class="btn btn-outline-danger" id="stop-btn" type="button">Stop Timer</button>
                    </div>
                    <div class="form-check form-switch mt-2">
                        <input class="form-check-input" type="checkbox" id="poke-dialogue-toggle">
                        <label class="form-check-label small" for="poke-dialogue-toggle">Use special dialogue while poking</label>
                    </div>
                </form>

                <!-- Trigger Toggle Button -->
                <div class="pt-2">
                    <button id="toggle-music-btn" class="btn btn-light btn-sm rounded-pill fw-semibold text-secondary px-3" type="button" data-bs-toggle="collapse" data-bs-target="#musicCollapse" aria-expanded="false" aria-controls="musicCollapse">Show Music Panel</button>
                </div>
            </div>

            <!-- LOWER FULL WIDTH ROW: The Collapsible Panel -->
            <div class="col-12">
                <div class="collapse border-top pt-3 mt-2" id="musicCollapse">
                    <div class="row g-3 align-items-stretch">

                        <!-- Lower Left image -->
                        <div class="col-md-5">
                            <div class="music-box position-relative h-100 d-flex align-items-center justify-content-center border rounded-3 p-3 bg-light">
                                <img id="collapse-character-img" src="https://i.postimg.cc/R0q2cPW0/image-2026-06-15-232616654.png" alt="companion" class="img-fluid pointer-cursor">
                            </div>
                        </div>

                        <!-- lower right -->
                        <div class="col-md-7">
                            <div class="music-controls-box rounded-3 overflow-hidden shadow-sm bg-white p-3 h-100 border">
                                <div class="music-panel-title mb-3 fw-bold">Music Addon</div>

                                <!-- Internal side-by-side splits for embedded media engines -->
                                <div class="row g-3">
                                    <!-- YouTube -->
                                    <div class="col-sm-6">
                                        <div class="embed-wrapper rounded-3 overflow-hidden shadow-sm">
                                            <iframe src="https://youtube.com" title="YouTube" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture;" allowfullscreen class="w-100" style="height: 140px;"></iframe>
                                        </div>
                                    </div>

                                    <!-- Spotify -->
                                    <div class="col-sm-6">
                                        <div class="embed-wrapper rounded-3 overflow-hidden shadow-sm">
                                            <iframe src="https://spotify.com" width="100%" height="140" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // giving value to the time
        const study_time = 25 * 60;
        const break_time = 5 * 60;

        // for character sprite gif
        const gif_study = "";
        const gif_break = "";
        const gif_poked = "";

        // dialogue for speech bubble
        const dialouge_tier = {
            level1: ["Let's get to work.", "Focus.", "Hmph."],
            level3: ["Good job.", "See? I knew you can do it.", "I trust that you are following along?"],
            level5: ["You are catching up well.", "Well Done.", "You are improving well."],
            poke: {
                level1: ["Ouch! Stop that!", "Hey! That tickles.", "Why are you poking me?"],
                level3: ["Okay, that's enough.", "Seriously? Don't poke me.", "Fine, I forgive you... this time."],
                level5: ["I know you are trying to get my attention.", "Hmph, you better study harder.", "I won't fall for that again."]
            }
        };

        // xp bar
        let affection_xp = parseInt(localStorage.getItem('companionXP')) || 0;
        let affection_level = parseInt(localStorage.getItem('companionLevel')) || 1;
        const XP_per_Level = 10;

        let timeLeft = study_time;
        let timerId = null;
        let isCurrentlyStudy = true;
        let isPoked = false;

        // ui elements
        const timeDisplay = document.getElementById('time-display');
        const statusLabel = document.getElementById('status-label');
        const characterImg = document.getElementById('character-img');
        const bubble = document.getElementById('speech-bubble');
        const achievementBox = document.getElementById('achievement-box');
        const pokeDialogueToggle = document.getElementById('poke-dialogue-toggle');

        function updateTime() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            if (timeDisplay) {
                timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        function updateDisplay() {
            updateTime();
        }

        function updatePokeDialogueModeLabel() {
            if (!pokeDialogueModeLabel) return;
            const modeText = pokeDialogueToggle && pokeDialogueToggle.checked ? 'special' : 'normal';
            pokeDialogueModeLabel.textContent = `Poke dialogue mode: ${modeText}`;
        }

        function updateStatusUI() {
            const levelXP = affection_xp % XP_per_Level;
            const percentage = (levelXP / XP_per_Level) * 100;
            const xpBarFill = document.getElementById('xp-bar-fill');
            const totalPointsText = document.getElementById('total-points-text');
            const levelBadge = document.getElementById('level-badge');

            if (xpBarFill) xpBarFill.style.width = `${percentage}%`;
            if (levelBadge) levelBadge.textContent = `Affection Lvl ${affection_level}`;
            if (totalPointsText) totalPointsText.textContent = `${levelXP} / ${XP_per_Level} XP (Total: ${affection_xp})`;

            checkMilestoneBadge();
        }

        function startTimer() {
            if (timerId !== null) return;
            timerId = setInterval(() => {
                timeLeft -= 1;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    switchMode();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (timerId !== null) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function resetTimer() {
            pauseTimer();
            isCurrentlyStudy = true;
            timeLeft = study_time;
            if (statusLabel) statusLabel.textContent = "Ready to study.";
            if (gif_study && characterImg) characterImg.src = gif_study;
            updateDisplay();
            updateStatusUI();
        }

        function switchMode() {
            if (isCurrentlyStudy) {
                affection_xp += 2;
                const newLevel = Math.floor(affection_xp / XP_per_Level) + 1;
                if (newLevel > affection_level) {
                    affection_level = newLevel;
                    triggerAchievementNotification(`Level UP! Level ${affection_level} Unlocked!`);
                }
                localStorage.setItem('companionXP', affection_xp);
                localStorage.setItem('companionLevel', affection_level);
                updateStatusUI();

                isCurrentlyStudy = false;
                timeLeft = break_time;
                if (statusLabel) statusLabel.textContent = "Hard work deserves a break.";
                if (gif_break && characterImg) characterImg.src = gif_break;
            } else {
                isCurrentlyStudy = true;
                timeLeft = study_time;
                if (statusLabel) statusLabel.textContent = "Let's continue where we left off.";
                if (gif_study && characterImg) characterImg.src = gif_study;
            }
            updateDisplay();
            startTimer();
        }

        function getPokeDialogue() {
            const useSpecial = pokeDialogueToggle && pokeDialogueToggle.checked;
            if (useSpecial) {
                if (affection_level >= 5) return dialouge_tier.poke.level5;
                if (affection_level >= 3) return dialouge_tier.poke.level3;
                return dialouge_tier.poke.level1;
            }

            if (affection_level >= 5) return dialouge_tier.level5;
            if (affection_level >= 3) return dialouge_tier.level3;
            return dialouge_tier.level1;
        }

        function pokeCharacter() {
            if (isPoked) return;
            isPoked = true;

            const dynamicPhrases = getPokeDialogue();
            const randomIndex = Math.floor(Math.random() * dynamicPhrases.length);
            const message = dynamicPhrases[randomIndex];

            if (bubble) {
                bubble.textContent = message;
                bubble.style.opacity = '1';
                bubble.style.visibility = 'visible';
            }
            if (gif_poked && characterImg) characterImg.src = gif_poked;

            setTimeout(() => {
                if (bubble) {
                    bubble.style.opacity = '';
                    bubble.style.visibility = '';
                }
                if (characterImg) {
                    if (isCurrentlyStudy && gif_study) {
                        characterImg.src = gif_study;
                    } else if (!isCurrentlyStudy && gif_break) {
                        characterImg.src = gif_break;
                    }
                }
                isPoked = false;
            }, 2000);
        }

        function triggerAchievementNotification(message) {
            if (!achievementBox) return;
            achievementBox.textContent = message;
            achievementBox.style.display = "block";
            setTimeout(() => {
                achievementBox.style.display = "none";
            }, 5000);
        }

        function checkMilestoneBadge() {
            if (affection_level === 3 && !localStorage.getItem('badge_lv3')) {
                localStorage.setItem('badge_lv3', 'true');
                triggerAchievementNotification("Achievement: Soften Heart");
            }
            if (affection_level === 5 && !localStorage.getItem('badge_lv5')) {
                localStorage.setItem('badge_lv5', 'true');
                triggerAchievementNotification("Achievement: Trusted Friend");
            }
        }

        function toggleMusicButtonText() {
            const toggleBtn = document.getElementById('toggle-music-btn');
            const musicPanel = document.getElementById('musicCollapse');
            if (!toggleBtn || !musicPanel) return;
            setTimeout(() => {
                if (musicPanel.classList.contains('show')) {
                    toggleBtn.textContent = "Hide Music Panel";
                } else {
                    toggleBtn.textContent = "Show Music Panel";
                }
            }, 50);
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateDisplay();
            updateStatusUI();
            updatePokeDialogueModeLabel();
            if (pokeDialogueToggle) {
                pokeDialogueToggle.addEventListener('change', updatePokeDialogueModeLabel);
            }
            if (characterImg) characterImg.addEventListener('click', pokeCharacter);
            const toggleBtn = document.getElementById('toggle-music-btn');
            if (toggleBtn) toggleBtn.addEventListener('click', toggleMusicButtonText);
            const stopBtn = document.getElementById('stop-btn');
            if (stopBtn) stopBtn.addEventListener('click', resetTimer);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>

</html>
