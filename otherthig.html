<style>
    .container {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;
        flex-wrap: wrap;
    }
    
    .item {
        background-color: #00AABB;
        color: white;
        padding: 20px;
        margin: 10px;
        flex: 1;
        height: 300px;
        text-align: center;
        border: 2px solid black;
    }
    
    img {
        width: 100%;
        height: auto;
        size: 100px 100px;
    }
    
    figcaption {
        font-size: 20px;
        font-weight: bold;
    }
    
    p {
        background-color: deepskyblue;
        color: white;
        padding: 10px;
        border: #00AABB solid 2px;
    }
    
    .menu {
        background-color: #09bb00a1;
        display: flex;
        flex-direction: row;
        padding: 10px;
        justify-content: center;
    }
    
    .menu a {
        display: block;
        color: white;
        text-align: center;
        padding: 10px;
        text-decoration: none;
    }
    
    .menu a:hover {
        background-color: #ddd;
        color: black;
    }
    
    @media (max-width: 600px) {
        p {
            background-color: lightcoral;
            font-size: 12px;
        }
        .menu {
            flex-direction: column;
        }
    }
    
    hr {
        border: 2px solid black;
    }
</style>
