    <div class="container">
        <h1 class="text-center">Task II: Weather in Paris</h1> <br>
        <div class="card">
            <div class="city text-center" id="cityName">Paris, Frances</div>
            <img id="weatherIcon" class="icon" src="https://openweathermap.org/img/wn/01d@2x.png" alt="Weather Icon">
            <div class="temp text-center" id="temp">--°C</div>
            <div class="desc text-center" id="desc">Loading...</div>

            <div class="details text-center">
                <div>Feels like<strong id="feels">--</strong></div>
                <div>Humidity<strong id="humidity">--</strong></div>
                <div>Wind<strong id="wind">--</strong></div>
            </div>
        </div>

        <button id="refreshBtn">Refresh</button>
        <p id="error" class="error"></p>
    </div>

    <script>
        const API_KEY = "c7910ecf9285591b16fd83379442a48c";

        const city = "Paris";

        function loadWeather() {
            const errorEl = document.getElementById("error");
            errorEl.textContent = "";

            // The "units=metric" parameter gives temperature in Celsius
            const url = "https://api.openweathermap.org/data/2.5/weather?q=Paris&appid" +
                city + "&units=metric&appid=" + API_KEY;

            fetch(url)
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error("Could not get weather (check API key).");
                    }
                    return response.json();
                })
                .then(function(data) {
                    document.getElementById("cityName").textContent = data.name + ", " + data.sys.country;
                    document.getElementById("temp").textContent = Math.round(data.main.temp) + "°C";
                    document.getElementById("desc").textContent = data.weather[0].description;
                    document.getElementById("feels").textContent = Math.round(data.main.feels_like) + "°C";
                    document.getElementById("humidity").textContent = data.main.humidity + "%";
                    document.getElementById("wind").textContent = data.wind.speed + " m/s";

                    const icon = data.weather[0].icon;
                    document.getElementById("weatherIcon").src =
                        "https://openweathermap.org/img/wn/" + icon + "@2x.png";
                })
                .catch(function(err) {
                    errorEl.textContent = err.message;
                });
        }

        loadWeather();

        document.getElementById("refreshBtn").addEventListener("click", loadWeather);
    </script>
